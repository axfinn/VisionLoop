<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionLoop 智能监控</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <div class="logo">📹 VisionLoop</div>
  <nav>
    <button class="tab-btn active" data-tab="monitor">实时监控</button>
    <button class="tab-btn" data-tab="playback">录像回放</button>
    <button class="tab-btn" data-tab="faces">人脸管理</button>
    <button class="tab-btn" data-tab="events">事件历史</button>
    <button class="tab-btn" data-tab="settings">⚙ 设置</button>
  </nav>
  <div id="status-bar">
    <span id="fps-display">FPS: --</span>
    <span id="faces-count">已注册: -- 人</span>
    <span id="conn-status" class="disconnected">● 未连接</span>
  </div>
</header>

<main>
  <!-- 实时监控 -->
  <section id="tab-monitor" class="tab-content active">
    <div class="monitor-layout">
      <div class="video-wrap">
        <canvas id="live-canvas"></canvas>
        <div id="no-signal">等待视频流...</div>
      </div>
      <aside class="event-panel">
        <div class="panel-header">
          <h3>实时事件</h3>
          <button id="clear-events">清空</button>
        </div>
        <ul id="event-list"></ul>
      </aside>
    </div>
  </section>

  <!-- 录像回放 -->
  <section id="tab-playback" class="tab-content">
    <div class="playback-layout">
      <div class="recording-list-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <h3>录像列表</h3>
          <button id="refresh-recordings">刷新</button>
        </div>
        <ul id="recording-list"></ul>
      </div>
      <div class="playback-player">
        <!-- 时间轴 -->
        <div id="timeline-wrap" style="display:none">
          <canvas id="timeline-canvas" height="48"></canvas>
          <div id="timeline-info"></div>
        </div>
        <video id="playback-video" controls style="display:none;width:100%;max-height:460px;background:#000"></video>
        <div id="playback-placeholder">← 选择左侧录像，或点击时间轴跳转</div>
        <div class="playback-controls" id="playback-controls" style="display:none">
          <span id="playing-name" style="flex:1;font-size:.82rem;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          <button id="stop-playback">停止</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 人脸管理 -->
  <section id="tab-faces" class="tab-content">
    <div class="faces-layout">
      <div class="enroll-form">
        <h3>注册新人脸</h3>
        <form id="enroll-form">
          <input type="text" id="face-name" placeholder="姓名" required>
          <input type="file" id="face-file" accept="image/jpeg,image/png" required>
          <button type="submit">注册</button>
        </form>
        <div id="enroll-msg"></div>
      </div>
      <div class="known-faces">
        <h3>已注册人脸</h3>
        <ul id="faces-list"></ul>
      </div>
    </div>
  </section>

  <!-- 事件历史 -->
  <section id="tab-events" class="tab-content">
    <div class="events-filter">
      <select id="filter-type">
        <option value="">全部类型</option>
        <option value="motion">运动</option>
        <option value="intrusion">入侵</option>
        <option value="face">人脸</option>
        <option value="stranger">陌生人</option>
        <option value="object">物体</option>
      </select>
      <div class="quick-ranges">
        <button class="range-btn" data-range="30m">近30分钟</button>
        <button class="range-btn" data-range="1h">近1小时</button>
        <button class="range-btn" data-range="today">今天</button>
        <button class="range-btn" data-range="yesterday">昨天</button>
        <button class="range-btn" data-range="7d">近7天</button>
        <button class="range-btn active" data-range="all">全部</button>
      </div>
      <input type="datetime-local" id="filter-since" title="开始时间">
      <input type="datetime-local" id="filter-until" title="结束时间">
      <button id="load-events">查询</button>
    </div>
    <table id="events-table">
      <thead><tr><th>时间</th><th>类型</th><th>标签</th><th>置信度</th><th>截图</th><th>操作</th></tr></thead>
      <tbody id="events-tbody"></tbody>
    </table>
    <div class="pagination" id="pagination">
      <button id="page-prev" disabled>上一页</button>
      <span id="page-info">第 1 页</span>
      <button id="page-next" disabled>下一页</button>
      <span id="page-total" style="color:#8b949e;font-size:.8rem"></span>
    </div>
  </section>

  <!-- 设置 -->
  <section id="tab-settings" class="tab-content">
    <div class="settings-layout">
      <div id="settings-msg" class="settings-msg" style="display:none"></div>

      <div class="settings-group">
        <h3>摄像头</h3>
        <label>视频源 <small>（摄像头索引或 RTSP URL）</small>
          <input type="text" id="cfg-camera-source">
        </label>
        <label>分辨率
          <select id="cfg-camera-res">
            <option value="1280x720">1280×720</option>
            <option value="1920x1080">1920×1080</option>
            <option value="640x480">640×480</option>
          </select>
        </label>
        <label>帧率 <input type="number" id="cfg-camera-fps" min="1" max="60"></label>
      </div>

      <div class="settings-group">
        <h3>检测器</h3>
        <label class="toggle-row">运动检测
          <input type="checkbox" id="cfg-motion-enabled">
        </label>
        <label>最小运动区域（像素）<input type="number" id="cfg-motion-area" min="100"></label>
        <label>入侵判定时长（秒）<input type="number" id="cfg-motion-intrusion" min="0.5" step="0.5"></label>

        <label class="toggle-row">人脸识别
          <input type="checkbox" id="cfg-face-enabled">
        </label>
        <label>匹配阈值 <small>（越小越严格）</small>
          <input type="number" id="cfg-face-tolerance" min="0.1" max="1" step="0.05">
        </label>

        <label class="toggle-row">目标检测（YOLO）
          <input type="checkbox" id="cfg-object-enabled">
        </label>
        <label>置信度阈值 <input type="number" id="cfg-object-conf" min="0.1" max="1" step="0.05"></label>
      </div>

      <div class="settings-group">
        <h3>录像</h3>
        <label class="toggle-row">启用录制
          <input type="checkbox" id="cfg-recording-enabled">
        </label>
        <label>每段时长（分钟）<input type="number" id="cfg-seg-minutes" min="1" max="60"></label>
        <label>最多保留段数 <input type="number" id="cfg-max-segments" min="1" max="200"></label>
        <label>最多锁定段数 <input type="number" id="cfg-max-locked" min="1" max="200"></label>
      </div>

      <div class="settings-group">
        <h3>告警</h3>
        <label>同类事件冷却（秒）<input type="number" id="cfg-cooldown" min="1"></label>
        <label class="toggle-row">保存截图
          <input type="checkbox" id="cfg-save-snapshots">
        </label>
      </div>

      <div class="settings-group">
        <h3>推流</h3>
        <label>JPEG 质量（1-100）<input type="number" id="cfg-stream-quality" min="1" max="100"></label>
      </div>

      <div class="settings-actions">
        <button id="save-settings">保存配置</button>
        <span style="font-size:.8rem;color:#8b949e">部分参数重启后生效</span>
      </div>
    </div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
